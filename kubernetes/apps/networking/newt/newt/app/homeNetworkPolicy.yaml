apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: homelab-newt-egress-policy
spec:
  podSelector:
    matchLabels:
      app: homelab-newt
  policyTypes:
    - Egress
  egress:
    # Pangolin VPS (control + data plane)
    - to:
        - ipBlock:
            cidr: 178.105.32.92/32
      ports:
        - protocol: TCP
          port: 443
        - protocol: UDP
          port: 51820
        - protocol: UDP
          port: 21820
    # Technitium DNS (off-cluster)
    - to:
        - ipBlock:
            cidr: 10.0.0.99/32
      ports:
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53
    # Internal NPM (off-cluster)
    - to:
        - ipBlock:
            cidr: 10.0.0.103/32
      ports:
        - protocol: TCP
          port: 443
    # Evo SSH (off-cluster)
    - to:
        - ipBlock:
            cidr: 10.0.0.59/32
      ports:
        - protocol: TCP
          port: 22
        - protocol: TCP
          port: 9000
    # PVE-01 (off-cluster)
    - to:
        - ipBlock:
            cidr: 10.0.0.67/32
      ports:
        - protocol: TCP
          port: 22
        - protocol: TCP
          port: 8006
    # PVE-02 (off-cluster)
    - to:
        - ipBlock:
            cidr: 10.0.0.225/32
      ports:
        - protocol: TCP
          port: 22
    # PVE-03 (off-cluster)
    - to:
        - ipBlock:
            cidr: 10.0.0.150/32
      ports:
        - protocol: TCP
          port: 22
    # kube-dns
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
