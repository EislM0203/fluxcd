---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: renovate
spec:
  interval: 15m
  chart:
    spec:
      chart: renovate
      version: 46.243.0
      sourceRef:
        kind: HelmRepository
        name: renovate
        namespace: flux-system
      interval: 15m
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    cronjob:
      # -- Schedules the job to run using cron notation
      schedule: '0 1 * * *'  # At 01:00 every day
      timeZone: 'Europe/Vienna'
    renovate:
      config: |
        {
          "platform": "github",
          "endpoint": "https://api.github.com",
          "autodiscover": false,
          "dryRun": null,
          "printConfig": true,
          "dependencyDashboard": true,
          "gitAuthor": "Renovate Bot <markuseisl2000@gmail.com>",
          "prConcurrentLimit": 20,
          "prHourlyLimit": 0,
          "repositories": ["EislM0203/fluxcd"],
          "flux": {
            "managerFilePatterns": ["/\\.yaml$/"]
          },
          "kubernetes": {
            "managerFilePatterns": ["/\\.yaml$/"]
          },
          "helm-values": {
            "managerFilePatterns": ["/\\.yaml$/"]
          }
        }
    envFrom:
      - secretRef:
          name: github-token-secret