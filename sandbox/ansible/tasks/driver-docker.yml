---
# Rootful Docker setup for the openshell user. The OpenShell vm/sandbox driver talks to
# dockerd over the default /var/run/docker.sock; openshell needs docker-group membership
# and the systemd unit lists 'docker' in SupplementaryGroups so the running process picks
# this up after the restart handler fires.

- name: Install Docker engine
  ansible.builtin.apt:
    name:
      - docker.io
    state: present
    update_cache: true

- name: Ensure docker service is enabled and running
  ansible.builtin.systemd:
    name: docker.service
    enabled: true
    state: started

- name: Add {{ openshell_user }} to the docker group
  ansible.builtin.user:
    name: "{{ openshell_user }}"
    groups: docker
    append: true
  notify: Restart openshell-gateway
