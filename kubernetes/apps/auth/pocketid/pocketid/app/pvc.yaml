---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  labels:
    app: pocketid
  name: pocketid-data
  annotations:
    numberOfReplicas: '1'
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: tns-csi-nvmeof
  dataSourceRef:
    kind: ReplicationDestination
    apiGroup: volsync.backube
    name: pocketid-restore  # Name of the ReplicationDestination
  resources:
    requests:
      storage: 2Gi
status: {}
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/volsync.backube/replicationdestination_v1alpha1.json
apiVersion: volsync.backube/v1alpha1
kind: ReplicationDestination
metadata:
  name: pocketid-restore
spec:
  trigger:
    manual: restore-once
  restic:
    repository: restic-pocketid
    storageClassName: tns-csi-nvmeof
    accessModes: ["ReadWriteOnce"]
    copyMethod: Snapshot
    volumeSnapshotClassName: tns-csi-nvmeof-snapshot-detached
    capacity: 2Gi
    enableFileDeletion: true
    cleanupCachePVC: true
    cleanupTempPVC: true
