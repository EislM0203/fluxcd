---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kubevip-app
  namespace: flux-system
spec:
  path: ./kubernetes/apps/kube-system/kubevip/app
  prune: true
  wait: true
  suspend: false
  sourceRef:
    kind: GitRepository
    name: fluxcd-kubernetes
    namespace: flux-system
  healthChecks:
    - apiVersion: apps/v1
      kind: DaemonSet
      name: kube-vip-ds
      namespace: kube-system
    - apiVersion: apps/v1
      kind: Deployment
      name: kube-vip-cloud-provider
      namespace: kube-system
  interval: 15m
  retryInterval: 15m
  timeout: 15m
  targetNamespace: kube-system
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kubevip-obs
  namespace: flux-system
spec:
  dependsOn:
    - name: kubevip-app
    - name: prometheus-app
  path: ./kubernetes/apps/kube-system/kubevip/obs
  prune: true
  wait: true
  suspend: false
  sourceRef:
    kind: GitRepository
    name: fluxcd-kubernetes
    namespace: flux-system
  healthChecks:
    - apiVersion: v1
      kind: Service
      name: kube-vip-metrics
      namespace: kube-system
  interval: 15m
  retryInterval: 15m
  timeout: 15m
  targetNamespace: kube-system
