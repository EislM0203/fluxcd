---
openshell_version: "0.0.48"

# Compute driver selection. Drives which driver-specific tasks run, which TOML section is
# rendered, what groups the systemd unit picks up, and what XDG_RUNTIME_DIR points at.
#   podman -> rootless podman (userns; recommended for trusted-ish workloads in the Proxmox VM)
#   docker -> rootful docker (simpler, but no userns; relies on the Proxmox VM as outer boundary)
#   vm     -> libkrun microVMs (separate guest kernel; strongest, but has the 0.0.47/0.0.48
#             /init.krun egress regression upstream)
openshell_compute_driver: podman

openshell_user: openshell
openshell_group: openshell
openshell_home: /var/lib/openshell

# Binary install locations (system-wide, root-owned)
openshell_bin_dir: /usr/local/bin
openshell_libexec_dir: /usr/local/libexec/openshell

# Config / state (XDG under the service user's home)
openshell_config_dir: "{{ openshell_home }}/.config/openshell"
openshell_state_dir: "{{ openshell_home }}/.local/state/openshell"
openshell_pki_dir: "{{ openshell_config_dir }}/pki"

# Gateway networking / identity
openshell_bind_address: "0.0.0.0:8080"
openshell_gateway_id: "labvm"
openshell_default_image: "harbor.cloud.traunseenet.com/library/pi:v0.0.1-dev"
# Supervisor container image (podman/docker drivers). Pinned to the gateway version to avoid
# the stale :latest cache bug observed previously. Ignored by the vm driver (embedded).
openshell_supervisor_image: "ghcr.io/nvidia/openshell/supervisor:{{ openshell_version }}"
# Name of the podman/docker network the driver attaches sandboxes to. Default 'podman' is
# the auto-created default network — the ONLY one that actually works for rootless bridge
# networking in podman 4.x. User-created bridge networks hit a rootless-netns propagation
# bug (`podman network ls` shows them, but `podman run --network <name>` fails with
# 'network not found' inside the rootless netns).
openshell_podman_network: "podman"
# Dialed by the in-sandbox supervisor to reach the gateway. For libkrun (vm), gvproxy/passt
# maps host.containers.internal -> the host loopback. For rootless podman, netavark + pasta
# inject host.containers.internal pointing at the host LAN IP (which is why the gateway must
# bind 0.0.0.0 -- already the case). Both work with the same value here.
openshell_grpc_endpoint: "https://host.containers.internal:8080"

# Release artifacts. As of 0.0.48 the gateway is shipped only via the .deb (the standalone
# openshell-gateway-*.tar.gz is gone). The .deb ships /usr/bin/openshell-gateway AND
# /usr/libexec/openshell/openshell-driver-vm, so one artifact covers all drivers.
openshell_release_base: "https://github.com/NVIDIA/OpenShell/releases/download/v{{ openshell_version }}"
openshell_gateway_deb: "openshell_{{ openshell_version }}-1_amd64.deb"
openshell_checksums_file: "openshell-checksums-sha256.txt"

# SOPS-encrypted PKI bundle (created out-of-band by the operator)
openshell_pki_sops_file: "{{ playbook_dir }}/files/openshell-pki.sops.yaml"
