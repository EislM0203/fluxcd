---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: n8n-pg
  annotations:
    cnpg.io/skipEmptyWalArchiveCheck: "enabled"
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:18
  enableSuperuserAccess: true
  primaryUpdateStrategy: unsupervised
  externalClusters:
    - name: &name n8n-pg
      plugin:
        name: barman-cloud.cloudnative-pg.io
        parameters:
          barmanObjectName: *name
          serverName: *name
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: *name
        serverName: *name
  bootstrap:
    initdb:
      database: n8n
      owner: n8n
    # recovery:
    #   source: *name
    #   database: n8n
    #   owner: n8n
  storage:
    pvcTemplate:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 10Gi
      storageClassName: tns-csi-nvmeof
      volumeMode: Filesystem
  monitoring:
    enablePodMonitor: true
  managed:
    services:
      disabledDefaultServices: ["ro", "r"]
---
apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: n8n-pg
spec:
  retentionPolicy: 20d
  configuration:
    destinationPath: s3://cnpg-backups/n8n
    endpointURL: http://10.0.0.154:9000
    s3Credentials:
      accessKeyId:
        name: s3-n8n-pg-backup
        key: AWS_ACCESS_KEY_ID
      secretAccessKey:
        name: s3-n8n-pg-backup
        key: AWS_SECRET_ACCESS_KEY
    data:
      compression: bzip2
    wal:
      compression: bzip2
      maxParallel: 8
---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: n8n-pg-backup
spec:
  schedule: "0 0 */6 * * *"
  backupOwnerReference: self
  cluster:
    name: n8n-pg
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
