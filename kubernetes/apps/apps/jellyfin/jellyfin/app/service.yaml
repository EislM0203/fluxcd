---
apiVersion: v1
kind: Service
metadata:
  name: jellyfin
spec:
  type: ClusterIP
  selector:
    app: jellyfin
  ports:
    - port: 8096
      name: http-tcp
      targetPort: 8096
      protocol: TCP
    - port: 8920
      name: https-tcp
      targetPort: 8920
      protocol: TCP
---
apiVersion: netbird.io/v1alpha1
kind: NetworkResource
metadata:
  name: jellyfin
spec:
  networkRouterRef:
    name: home-router
    namespace: networking
  serviceRef:
    name: jellyfin
  groups:
    - name: Apps Resources