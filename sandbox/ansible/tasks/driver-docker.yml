---
# Rootful Docker for the openshell user. Driver talks to /var/run/docker.sock; openshell
# joins docker group; systemd unit picks it up via SupplementaryGroups.

- name: Install Docker engine
  ansible.builtin.apt:
    name:
      - docker.io
    state: present
    update_cache: true

- name: Ensure docker service is enabled and running
  ansible.builtin.systemd:
    name: docker.service
    enabled: true
    state: started

- name: Add {{ openshell_user }} to the docker group
  ansible.builtin.user:
    name: "{{ openshell_user }}"
    groups: docker
    append: true
  notify: Restart openshell-gateway
