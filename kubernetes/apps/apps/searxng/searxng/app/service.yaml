apiVersion: v1
kind: Service
metadata:
  # Not named "searxng": the generated service-link env var SEARXNG_PORT
  # (tcp://<clusterIP>:8080) would collide with the container's port setting.
  name: searxng-web
  labels:
    app: searxng
spec:
  type: ClusterIP
  selector:
    app: searxng
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: searxng-mcp
  labels:
    app: searxng-mcp
spec:
  type: ClusterIP
  selector:
    app: searxng-mcp
  ports:
    - name: http
      port: 3000
      targetPort: http
      protocol: TCP
