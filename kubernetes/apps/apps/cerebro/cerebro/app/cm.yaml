apiVersion: v1
kind: ConfigMap
metadata:
  name: cerebro-config
data:
  LOG_LEVEL: "INFO"
  SERVER_HOST: "0.0.0.0"
  SERVER_PORT: "8080"
  SERVER_ADMIN_USER: "admin"
  CEREBRO_CONFIG_DIR: "/config"
  OPENAI_BASE_URL: "http://10.0.0.59:9000/v1"
  LLM_MODEL_NAME: "Qwen3.6-35B-A3B"
  EMBEDDING_MODEL_NAME: "Qwen-Embed-4B"
  EMBEDDING_DIM: "2560"
  DEFAULT_LANGUAGE: "english"
  SECURE_COOKIES: "true"
  MCP_TRANSPORT: "sse"
  MCP_PORT: "8000"
  CEREBRO_WORKSPACE: "default"
  OTEL_ENABLED: "true"
  OTEL_EXPORTER_OTLP_ENDPOINT: http://opentelemetry-collector.observability.svc.cluster.local:4317
  SSO_ENABLED: "true"
  SSO_DISCOVERY_URL: https://pocketid.cloud.traunseenet.com/.well-known/openid-configuration
  SSO_REDIRECT_URI: https://cerebro.cloud.traunseenet.com/api/auth/sso/callback
  SSO_AUTO_LINK_USERS: "true"
