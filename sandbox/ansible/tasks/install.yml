---
- name: Create libexec directory for the vm driver
  when: openshell_compute_driver == 'vm'
  ansible.builtin.file:
    path: "{{ openshell_libexec_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Check installed gateway version
  ansible.builtin.command: "{{ openshell_bin_dir }}/openshell-gateway --version"
  register: openshell_installed
  changed_when: false
  failed_when: false

# dpkg -x (not -i) so we skip the upstream bundled user/unit/config and just lift the
# binaries into /usr/local.
- name: Install OpenShell gateway (+ vm-driver binary when driver=vm)
  when: openshell_version not in (openshell_installed.stdout | default(''))
  block:
    - name: Download gateway .deb
      ansible.builtin.get_url:
        url: "{{ openshell_release_base }}/{{ openshell_gateway_deb }}"
        dest: "/tmp/{{ openshell_gateway_deb }}"
        mode: "0644"

    # TOFU: checksums fetched over HTTPS, not pinned. Gates the .deb below.
    - name: Download combined checksums
      ansible.builtin.get_url:
        url: "{{ openshell_release_base }}/{{ openshell_checksums_file }}"
        dest: "/tmp/{{ openshell_checksums_file }}"
        mode: "0644"

    - name: Verify .deb checksum
      ansible.builtin.shell: >-
        set -o pipefail;
        cd /tmp &&
        grep -E {{ ('  ' + openshell_gateway_deb + '$') | quote }}
        {{ openshell_checksums_file }} | sha256sum -c -
      args:
        executable: /bin/bash
      changed_when: false

    - name: Create extraction directory
      ansible.builtin.file:
        path: /tmp/openshell-extract
        state: directory
        mode: "0755"

    - name: Extract .deb payload (non-installing)
      ansible.builtin.command: "dpkg -x /tmp/{{ openshell_gateway_deb }} /tmp/openshell-extract"
      changed_when: true

    - name: Install gateway binary
      ansible.builtin.copy:
        src: /tmp/openshell-extract/usr/bin/openshell-gateway
        dest: "{{ openshell_bin_dir }}/openshell-gateway"
        remote_src: true
        owner: root
        group: root
        mode: "0755"
      notify: Restart openshell-gateway

    - name: Install driver-vm binary
      when: openshell_compute_driver == 'vm'
      ansible.builtin.copy:
        src: /tmp/openshell-extract/usr/libexec/openshell/openshell-driver-vm
        dest: "{{ openshell_libexec_dir }}/openshell-driver-vm"
        remote_src: true
        owner: root
        group: root
        mode: "0755"
      notify: Restart openshell-gateway
