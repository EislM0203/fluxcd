---
- name: Deploy OpenShell vm-driver gateway
  hosts: sandbox
  become: true
  gather_facts: true

  tasks:
    - name: Base setup
      ansible.builtin.import_tasks: tasks/base.yml
    - name: Driver-specific setup ({{ openshell_compute_driver }})
      ansible.builtin.include_tasks: "tasks/driver-{{ openshell_compute_driver }}.yml"
      when: openshell_compute_driver in ['podman', 'docker']
    - name: Install OpenShell binaries
      ansible.builtin.import_tasks: tasks/install.yml
    - name: Configure gateway
      ansible.builtin.import_tasks: tasks/configure.yml

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Restart openshell-gateway
      ansible.builtin.systemd:
        name: openshell-gateway.service
        state: restarted
