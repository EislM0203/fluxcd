---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fin-api
  labels:
    app: fin
    component: api
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: fin
      component: api
  template:
    metadata:
      labels:
        app: fin
        component: api
    spec:
      containers:
        - name: api
          image: harbor.cloud.traunseenet.com/library/fin-api:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: DATABASE_URL
              value: sqlite:////data/fin.db
          volumeMounts:
            - name: sqlite-data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: sqlite-data
          persistentVolumeClaim:
            claimName: fin-sqlite-data
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fin-web
  labels:
    app: fin
    component: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fin
      component: web
  template:
    metadata:
      labels:
        app: fin
        component: web
    spec:
      containers:
        - name: web
          image: harbor.cloud.traunseenet.com/library/fin-web:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
