---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openshell
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: openshell
    namespace: flux-system
  install:
    # Sandbox CRD is installed by the agent-sandbox Kustomization, not this chart.
    crds: Skip
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    crds: Skip
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    replicaCount: 1

    workload:
      # Use Deployment (not StatefulSet) — no sqlite PVC needed with external Postgres.
      kind: deployment

    image:
      repository: ghcr.io/nvidia/openshell/gateway
      tag: "0.0.83"
      pullPolicy: IfNotPresent

    supervisor:
      image:
        repository: ghcr.io/nvidia/openshell/supervisor
        # Pinned to the gateway version; since 0.0.82 the gateway auto-pins anyway
        # (PR #2070), the explicit tag just keeps the deployment reproducible.
        tag: "0.0.83"
      # Force init-container (emptyDir) delivery of the supervisor instead of the chart's
      # auto-selected image-volume. On K8s 1.35 the default is image-volume, but RKE2's
      # containerd 2.1.5 cannot idmap an overlay merged-mount image-volume under
      # enableUserNamespaces (hostUsers: false), so sandbox pods fail to start. emptyDir
      # (tmpfs/ext4) IS idmappable, so init-container makes userns work without a
      # containerd/RKE2 upgrade.
      sideloadMethod: init-container
      # Sidecar topology (PR #2076, 0.0.82) instead of the default "combined": a network
      # init container (UID 0, NET_ADMIN/NET_RAW/CHOWN/FOWNER) installs nftables rules in
      # the pod's existing netns, so the supervisor never runs `ip netns add` — which is
      # what made combined topology unfixable here (containerd hands the pod LOCKED mount
      # propagation; `mount --make-shared /run/netns` fails even with CAP_SYS_ADMIN, and
      # proxy mode is mandatory). No privileged containers needed.
      topology: sidecar
      # Defaults spelled out: binary-aware policy runs the long-lived network sidecar as
      # UID 0 with SYS_PTRACE+DAC_READ_SEARCH (needs PSA baseline, not restricted, in the
      # apps namespace). Set processBinaryAwareNetworkPolicy: false to run it as proxyUid
      # at the cost of binary-identity network policy.
      sidecar:
        proxyUid: 1337
        processBinaryAwareNetworkPolicy: true

    serviceAccount:
      create: true

    service:
      type: ClusterIP
      port: 8080
      healthPort: 8081
      metricsPort: 9090

    podSecurityContext:
      fsGroup: 1000
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL

    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 512Mi

    server:
      logLevel: info
      # CNPG auto-generates <cluster>-app secret with key "uri" (postgresql://...).
      # The chart reads OPENSHELL_DB_URL from that key — no bridge secret needed.
      externalDbSecret: openshell-pg-app
      # Empty = release namespace ("apps") - Sandbox CRs spawn alongside other workloads.
      sandboxNamespace: ""
      # Disabled: the chart default and OpenShell's supported baseline. userns is an
      # opt-in defense-in-depth layer, NOT the primary boundary (that's the always-on
      # network proxy + Landlock + seccomp + privilege-drop jail). History: with the old
      # "combined" topology (≤0.0.81 the only option) sandbox startup was broken here
      # regardless of userns — the supervisor's `ip netns add` failed with
      #   mount --make-shared /run/netns: Permission denied
      # (containerd hands the pod LOCKED mount propagation; unfixable without a
      # privileged pod). supervisor.topology: sidecar above avoids the netns entirely,
      # which is what made this deployment viable. Enabling userns additionally requires
      # sideloadMethod: init-container (see above) on this containerd.
      enableUserNamespaces: false
      # Upstream sandbox base image has no semver tags - only :latest + commit SHAs.
      # Pinned to the current digest for reproducibility. Bump manually after
      # reviewing diffs at https://github.com/NVIDIA/openshell-community.
      sandboxImage: "ghcr.io/nvidia/openshell-community/sandboxes/base@sha256:e29a8e98c1399aa08a8c624d758d1814b6edbe0302eb570c0468a6d3e811d167"
      sandboxImagePullPolicy: "IfNotPresent"
      # Persistent sandbox workspaces. The chart exposes no storageClassName for
      # these PVCs — they use the cluster default SC (longhorn-storage).
      workspaceDefaultStorageSize: "5Gi"

      # Traefik terminates external TLS with a Let's Encrypt cert (see
      # ingressroute.yaml). The gateway runs plaintext gRPC (h2c) internally.
      # User auth is OIDC; supervisor mTLS is handled by chart certManager.
      disableTls: true
      enableLoopbackServiceHttp: true

      oidc:
        issuer: "https://pocketid.cloud.traunseenet.com"
        # PocketID emits the OIDC client UUID as the `aud` claim, not a human
        # name. This must match the client created in PocketID admin UI.
        audience: "b1a99173-a4e5-4034-a6cf-9dd3b520c222"
        jwksTtl: 3600
        rolesClaim: "amr"
        adminRole: "phr"
        userRole: "phr"

    # Chart's NetworkPolicy locks sandbox SSH (port 2222) to the gateway only.
    networkPolicy:
      enabled: true

    # cert-manager manages supervisor mTLS PKI and the JWT signing secret.
    # The external server TLS cert (Let's Encrypt, for Traefik) lives in
    # ingressroute.yaml and is separate from this internal PKI.
    certManager:
      enabled: true
    pkiInitJob:
      enabled: false

    grpcRoute:
      enabled: false
