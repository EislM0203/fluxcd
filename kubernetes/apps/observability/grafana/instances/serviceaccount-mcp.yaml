---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/grafana.integreatly.org/grafanaserviceaccount_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaServiceAccount
metadata:
  name: mcp-grafana-viewer
spec:
  name: mcp-grafana-viewer
  instanceName: grafana
  role: Viewer
  isDisabled: false
  # Grafana is stateless: the operator re-creates the SA + token after every
  # Grafana restart and patches the Secret. Short resync keeps the 401 window small.
  resyncPeriod: 1m
  tokens:
    - name: mcp-token
      secretName: grafana-mcp-viewer-token
      # no `expires`: token never expires
