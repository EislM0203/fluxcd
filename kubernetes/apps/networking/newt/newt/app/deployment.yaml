apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-newt
  labels:
    app: k8s-newt
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k8s-newt
  template:
    metadata:
      labels:
        app: k8s-newt
    spec:
      containers:
        - name: k8s-newt
          image: fosrl/newt:1.11.0
          args:
            - --blueprint-file
            - /etc/newt/blueprint.yaml
          volumeMounts:
            - name: blueprint
              mountPath: /etc/newt/blueprint.yaml
              subPath: blueprint.yaml
              readOnly: true
          env:
            - name: PANGOLIN_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: k8s-newt-auth
                  key: PANGOLIN_ENDPOINT
            - name: NEWT_ID
              valueFrom:
                secretKeyRef:
                  name: k8s-newt-auth
                  key: NEWT_ID
            - name: NEWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: k8s-newt-auth
                  key: NEWT_SECRET
          resources:
            limits:
              memory: "256Mi"
              cpu: "500m"
            requests:
              memory: "128Mi"
              cpu: "250m"
          imagePullPolicy: IfNotPresent
      volumes:
        - name: blueprint
          configMap:
            name: k8s-newt-blueprint
