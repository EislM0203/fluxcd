---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: netbird-operator
spec:
  interval: 15m
  chart:
    spec:
      chart: kubernetes-operator
      version: v0.3.1
      sourceRef:
        kind: HelmRepository
        name: netbirdio
        namespace: flux-system
      interval: 15m
  maxHistory: 2
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    crds: CreateReplace
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    managementURL: https://nb.traunseenet.com
    operator:
      image:
        tag: 0.3.1
    netbirdAPI:
      keyFromSecret:
        name: "netbird-mgmt-api-key"
        key: "NB_API_KEY"