---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openshell
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: openshell
    namespace: flux-system
  install:
    # Sandbox CRD is installed by the agent-sandbox Kustomization, not this chart.
    crds: Skip
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    crds: Skip
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  # The chart hardcodes the StatefulSet's volumeClaimTemplate without a
  # storageClassName, so it would otherwise use the cluster default. Pin it
  # to tns-csi-nvmeof-retain via a Kustomize JSON patch (retain reclaim policy
  # so the gateway's sqlite state survives a HelmRelease delete/reinstall).
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: StatefulSet
              name: openshell
            patch: |
              - op: add
                path: /spec/volumeClaimTemplates/0/spec/storageClassName
                value: tns-csi-nvmeof-retain
  values:
    replicaCount: 1

    image:
      repository: ghcr.io/nvidia/openshell/gateway
      tag: "0.0.50"
      pullPolicy: IfNotPresent

    supervisor:
      image:
        repository: ghcr.io/nvidia/openshell/supervisor
        tag: "0.0.50"
      # Force init-container (emptyDir) delivery of the supervisor instead of the chart's
      # auto-selected image-volume. On K8s 1.35 the default is image-volume, but RKE2's
      # containerd 2.1.5 cannot idmap an overlay merged-mount image-volume under
      # enableUserNamespaces (hostUsers: false), so sandbox pods fail to start. emptyDir
      # (tmpfs/ext4) IS idmappable, so init-container makes userns work without a
      # containerd/RKE2 upgrade.
      sideloadMethod: init-container

    serviceAccount:
      create: true

    service:
      type: ClusterIP
      port: 8080
      healthPort: 8081
      metricsPort: 9090

    podSecurityContext:
      fsGroup: 1000
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL

    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 512Mi

    server:
      logLevel: info
      # Empty = release namespace ("apps") - Sandbox CRs spawn alongside other workloads.
      sandboxNamespace: ""
      # Disabled: the chart default and OpenShell's supported baseline. userns is an
      # opt-in defense-in-depth layer, NOT the primary boundary (that's the always-on
      # netns proxy + Landlock + seccomp + privilege-drop jail). Enabling it does NOT fix
      # sandbox startup here - the real blocker is unrelated to userns. Verified on the
      # live pod: the spawned sandbox runs as root (runAsUser:0) with CAP_SYS_ADMIN +
      # CAP_NET_ADMIN and userns OFF, yet the supervisor's `ip netns add` still fails with
      #   mount --make-shared /run/netns: Permission denied
      # because containerd hands the pod a mount namespace with LOCKED mount propagation,
      # and you cannot change a locked mount to shared even with CAP_SYS_ADMIN. Proxy mode
      # is mandatory (NetworkMode::Proxy, no observation fallback - upstream #1194) and
      # needs that netns, so the only k8s fix is a PRIVILEGED sandbox pod (or /run/netns
      # via a volume with mountPropagation: Bidirectional, which k8s only permits on a
      # privileged container). The VM driver is not an escape hatch either: its egress
      # enforcement regressed in v0.0.43 (PR #1263) and is still broken through v0.0.51.
      enableUserNamespaces: false
      # Upstream sandbox base image has no semver tags - only :latest + commit SHAs.
      # Pinned to the current digest for reproducibility. Bump manually after
      # reviewing diffs at https://github.com/NVIDIA/openshell-community.
      sandboxImage: "ghcr.io/nvidia/openshell-community/sandboxes/base@sha256:aeef1c63f00e2913ea002ccb3aaf925f338b5c5d70e63576f0d95c16a138044e"
      sandboxImagePullPolicy: "IfNotPresent"

      # End-to-end mTLS: Traefik TLS-passthroughs the connection so the
      # chart-issued server cert is what the CLI sees. Combined with OIDC,
      # this gives two-factor auth (client cert + JWT) and preserves the
      # supervisor's sandbox-class identity for in-cluster callbacks.
      disableTls: false
      disableGatewayAuth: false
      enableLoopbackServiceHttp: true

      tls:
        certSecretName: openshell-server-tls
        clientCaSecretName: openshell-server-client-ca
        clientTlsSecretName: openshell-client-tls

      oidc:
        issuer: "https://pocketid.cloud.traunseenet.com"
        # PocketID emits the OIDC client UUID as the `aud` claim, not a human
        # name. This must match the client created in PocketID admin UI.
        audience: "b1a99173-a4e5-4034-a6cf-9dd3b520c222"
        jwksTtl: 3600
        rolesClaim: "amr"
        adminRole: "phr"
        userRole: "phr"

    # Chart's NetworkPolicy locks sandbox SSH (port 2222) to the gateway only.
    networkPolicy:
      enabled: true

    # cert-manager issues an internal CA + server cert + client cert for mTLS.
    # SANs include the external hostname (Traefik passthrough preserves SNI),
    # the in-cluster service names (supervisor callbacks), and localhost
    # (kubectl port-forward fallback).
    pkiInitJob:
      enabled: false
    certManager:
      enabled: true
      caSecretName: openshell-ca-tls
      clientCaFromServerTlsSecret: true
      certificateDuration: 8760h
      certificateRenewBefore: 720h
      serverDnsNames:
        - openshell.cloud.traunseenet.com
        - openshell
        - openshell.apps.svc
        - openshell.apps.svc.cluster.local
        - localhost
        - openshell.localhost
        - "*.openshell.localhost"
        - host.docker.internal
      serverIpAddresses:
        - 127.0.0.1

    grpcRoute:
      enabled: false
