apiVersion: apps/v1
kind: Deployment
metadata:
  name: karakeep
  labels:
    app: karakeep
spec:
  replicas: 1
  selector:
    matchLabels:
      app: karakeep
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: karakeep
    spec:
      containers:
        - name: karakeep
          image: ghcr.io/karakeep-app/karakeep:0.32.0
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: karakeep
                  key: NEXTAUTH_SECRET
            - name: NEXTAUTH_URL
              value: https://karakeep.cloud.traunseenet.com
            - name: DATA_DIR
              value: /data
            - name: MEILI_ADDR
              value: http://karakeep-meilisearch:7700
            - name: MEILI_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: karakeep
                  key: MEILI_MASTER_KEY
            - name: BROWSER_WEB_URL
              value: http://karakeep-chrome:9222
            - name: OPENAI_BASE_URL
              value: http://10.0.0.59:9000/v1
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: karakeep
                  key: OPENAI_API_KEY
            - name: INFERENCE_TEXT_MODEL
              value: Qwen3.6-35B-A3B
            - name: INFERENCE_IMAGE_MODEL
              value: Qwen3.6-35B-A3B
            - name: EMBEDDING_TEXT_MODEL
              value: Qwen-Embed-4B
            - name: INFERENCE_JOB_TIMEOUT_SEC
              value: "300"
            - name: INFERENCE_FETCH_TIMEOUT_SEC
              value: "600"
          volumeMounts:
            - name: karakeep-data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: karakeep-data
          persistentVolumeClaim:
            claimName: karakeep-data
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: karakeep-chrome
  labels:
    app: karakeep-chrome
spec:
  replicas: 1
  selector:
    matchLabels:
      app: karakeep-chrome
  template:
    metadata:
      labels:
        app: karakeep-chrome
    spec:
      containers:
        - name: chrome
          image: gcr.io/zenika-hub/alpine-chrome:124
          args:
            - --no-sandbox
            - --disable-gpu
            - --disable-dev-shm-usage
            - --remote-debugging-address=0.0.0.0
            - --remote-debugging-port=9222
            - --hide-scrollbars
          ports:
            - name: chrome
              containerPort: 9222
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: karakeep-meilisearch
  labels:
    app: karakeep-meilisearch
spec:
  replicas: 1
  selector:
    matchLabels:
      app: karakeep-meilisearch
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: karakeep-meilisearch
    spec:
      containers:
        - name: meilisearch
          image: docker.io/getmeili/meilisearch:v1.41.0
          ports:
            - name: meilisearch
              containerPort: 7700
              protocol: TCP
          env:
            - name: MEILI_NO_ANALYTICS
              value: "true"
            - name: MEILI_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: karakeep
                  key: MEILI_MASTER_KEY
          volumeMounts:
            - name: karakeep-meilisearch
              mountPath: /meili_data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: karakeep-meilisearch
          persistentVolumeClaim:
            claimName: karakeep-meilisearch
