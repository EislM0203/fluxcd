---
# cert-manager issues the LE cert. The gateway serves this cert directly (TCP
# passthrough) so the CLI sees a Let's Encrypt cert and trusts it via the
# system CA store — no internal CA pinning.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: openshell-tls
spec:
  secretName: openshell-tls
  dnsNames:
    - openshell.cloud.traunseenet.com
  duration: 2160h
  renewBefore: 360h
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-prod
---
apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: openshell
spec:
  entryPoints:
    - websecure
  routes:
    - match: HostSNI(`openshell.cloud.traunseenet.com`)
      services:
        - name: openshell
          port: 8080
  tls:
    passthrough: true
