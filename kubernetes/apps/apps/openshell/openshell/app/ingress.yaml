---
# LE cert for Traefik TLS termination. Gateway runs plaintext h2c internally
# (disableTls: true). certManager is disabled on the gateway so no internal CA
# is advertised to the CLI — it uses the system trust store for the LE cert.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: openshell-tls
spec:
  secretName: openshell-tls
  dnsNames:
    - openshell.cloud.traunseenet.com
  duration: 2160h
  renewBefore: 360h
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-prod
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: openshell
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`openshell.cloud.traunseenet.com`)
      kind: Rule
      services:
        - name: openshell
          port: 8080
          scheme: h2c
  tls:
    secretName: openshell-tls
