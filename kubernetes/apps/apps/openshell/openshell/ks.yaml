---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: openshell-app
  namespace: flux-system
spec:
  dependsOn:
    - name: agent-sandbox
    - name: pocketid-app
    - name: cert-manager-addons
    - name: traefik-base
    - name: cnpg
    - name: longhorn-addons
  path: ./kubernetes/apps/apps/openshell/openshell/app
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: fluxcd-kubernetes
    namespace: flux-system
  healthChecks:
    - apiVersion: postgresql.cnpg.io/v1
      kind: Cluster
      name: openshell-pg
      namespace: apps
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: openshell
      namespace: apps
  interval: 1h
  retryInterval: 5m
  timeout: 10m
  targetNamespace: apps
